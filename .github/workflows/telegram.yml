name: Telegram upload

on:
  repository_dispatch:
    types: [telegram-upload]
  workflow_dispatch:
    inputs:
      source:
        description: "HTTP(S) URL to download and upload"
        required: true
        type: string
      filename:
        description: "Override filename (optional)"
        required: false
        type: string
        default: ""
      service:
        description: "Upload service: pixeldrain | filekiwi"
        required: false
        type: choice
        default: "pixeldrain"
        options:
          - pixeldrain
          - filekiwi

jobs:
  upload:
    runs-on: ubuntu-latest
    # Fix 5: Extended from 120 → 240 minutes (4 hours) so 15-25GB uploads on
    # slow links don't hit the workflow-level timeout before completing.
    timeout-minutes: 240
    env:
      PIXELDRAIN_TOKEN: ${{ secrets.PIXELDRAIN_TOKEN }}
      VERCEL_CALLBACK_URL: ${{ secrets.VERCEL_CALLBACK_URL }}
      VERIFY_TOKEN: ${{ secrets.BOT_VERIFY_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fix 1 (v8.2 revised): Fast manual disk cleanup.
      #
      # Previous attempt used easimon/maximize-build-space@master but it broke
      # actions/setup-node@v4 (the action resizes the root partition and moves
      # /home/runner, which causes setup-node to fail when extracting Node to
      # a path that no longer exists or is on a too-small filesystem). The
      # job died at step 4 "Setup Node" after only 78 seconds.
      #
      # Reverted to manual cleanup but OPTIMIZED: we skip the slow apt-get clean
      # and docker system prune (which took 3+ min in the original) and instead
      # do a targeted rm -rf of the big space consumers. This frees ~75GB in
      # under 30 seconds (vs 3+ min for the original) without breaking setup-node.
      # The previous successful run had 110GB free after this style of cleanup,
      # which is plenty for a 26GB REMUX + 26GB of split parts.
      - name: Maximize build disk space
        shell: bash
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          echo ""
          echo "=== Removing large pre-installed SDKs (dotnet, android, haskell, codeql) ==="
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          echo ""
          echo "=== Removing unused Docker images (fast, non-blocking) ==="
          docker image prune -af --filter "until=1h" 2>/dev/null || true
          echo ""
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install @file-kiwi/node SDK + ffmpeg
        shell: bash
        run: |
          echo "=== Installing @file-kiwi/node SDK (for file.kiwi uploads) ==="
          npm install @file-kiwi/node --no-save 2>&1 | tail -3
          echo ""
          echo "=== Installing ffmpeg (for pixeldrain >10GB auto-splitting) ==="
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg 2>&1 | tail -3
          echo ""
          echo "=== Verify installs ==="
          node -e "const m = require('@file-kiwi/node'); console.log('@file-kiwi/node exports:', Object.keys(m))"
          ffmpeg -version | head -1

      # Extract dispatch payload fields to GITHUB_ENV so later steps (including
      # the cancellation handler, which runs with `if: cancelled()`) can access
      # CHAT_ID_VAL without re-parsing the event JSON.
      - name: Parse dispatch payload
        shell: bash
        run: |
          set -euo pipefail
          echo "$EVENT_PAYLOAD" > /tmp/event.json
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            CHAT_ID_VAL=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.chat_id?String(p.chat_id):"")}catch(_){process.stdout.write("")}')
            SERVICE_VAL=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.service||"")}catch(_){process.stdout.write("")}')
          else
            CHAT_ID_VAL=""
            SERVICE_VAL="${{ inputs.service }}"
          fi
          [ -z "$SERVICE_VAL" ] && SERVICE_VAL="pixeldrain"
          # Export to GITHUB_ENV so subsequent steps (incl. cancelled()) can read them
          echo "CHAT_ID_VAL=$CHAT_ID_VAL" >> $GITHUB_ENV
          echo "SERVICE_VAL=$SERVICE_VAL" >> $GITHUB_ENV
          # Also save as step output for direct use within the upload step
          echo "chat_id=$CHAT_ID_VAL" >> $GITHUB_OUTPUT
          echo "service=$SERVICE_VAL" >> $GITHUB_OUTPUT
          echo "===== PARSED PAYLOAD ====="
          echo "chat_id  = $CHAT_ID_VAL"
          echo "service  = $SERVICE_VAL"
          echo "=========================="
        env:
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}

      - name: Download and upload
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SOURCE=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.source_url||"")}catch(_){process.stdout.write("")}')
            FILENAME=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.filename||"")}catch(_){process.stdout.write("")}')
            CHAT_ID_VAL="$CHAT_ID_VAL"
            SERVICE_VAL="$SERVICE_VAL"
            CALLBACK_VAL="$VERCEL_CALLBACK_URL"
          else
            SOURCE="${{ inputs.source }}"
            FILENAME="${{ inputs.filename }}"
            SERVICE_VAL="${{ inputs.service }}"
            CHAT_ID_VAL=""
            CALLBACK_VAL=""
          fi

          # Default service to pixeldrain if missing/empty
          if [ -z "$SERVICE_VAL" ]; then
            SERVICE_VAL="pixeldrain"
          fi

          echo "===== DISPATCH PAYLOAD ====="
          echo "source   = $SOURCE"
          echo "filename = $FILENAME"
          echo "service  = $SERVICE_VAL"
          echo "chat_id  = $CHAT_ID_VAL"
          echo "============================"

          if [ -z "$SOURCE" ]; then
            echo "::error::No source URL provided"
            if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
              ERR_PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" SERVICE_VAL="$SERVICE_VAL" node -e 'console.log(JSON.stringify({chat_id:process.env.CHAT_ID_VAL,service:process.env.SERVICE_VAL,error:"empty source_url in dispatch payload"}))')
              curl -fsS -X POST "$CALLBACK_VAL" \
                -H "Content-Type: application/json" \
                -H "X-Verify: $VERIFY_TOKEN" \
                -d "$ERR_PAYLOAD" || true
            fi
            exit 1
          fi

          # Service-specific env validation
          if [ "$SERVICE_VAL" = "pixeldrain" ] && [ -z "$PIXELDRAIN_TOKEN" ]; then
            echo "::error::service=pixeldrain but PIXELDRAIN_TOKEN secret is not set"
            if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
              ERR_PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" SERVICE_VAL="$SERVICE_VAL" node -e 'console.log(JSON.stringify({chat_id:process.env.CHAT_ID_VAL,service:process.env.SERVICE_VAL,error:"PIXELDRAIN_TOKEN secret not configured"}))')
              curl -fsS -X POST "$CALLBACK_VAL" \
                -H "Content-Type: application/json" \
                -H "X-Verify: $VERIFY_TOKEN" \
                -d "$ERR_PAYLOAD" || true
            fi
            exit 1
          fi
          # filekiwi needs no token (anonymous upload) — just needs @file-kiwi/node installed

          ARGS=( "$SOURCE" )
          [ -n "$FILENAME" ] && ARGS+=( "$FILENAME" )
          # Pass content_type as empty string so upload.mjs falls back to HEAD-detected type
          ARGS+=( "" )
          # 4th arg = service
          ARGS+=( "$SERVICE_VAL" )

          echo "Running: node upload.mjs <url> '${FILENAME}' '' '${SERVICE_VAL}'"

          set +e
          OUT=$(node upload.mjs "${ARGS[@]}" 2>&1 | tee /dev/stderr)
          STATUS=$?
          set -e

          JSON=$(echo "$OUT" | sed -n '/RESULT_JSON_BEGIN/,/RESULT_JSON_END/p' | sed '1d;$d')
          if [ $STATUS -ne 0 ] || [ -z "$JSON" ]; then
            echo "::error::upload script failed (exit $STATUS)"
            if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
              ERR_PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" SERVICE_VAL="$SERVICE_VAL" node -e 'console.log(JSON.stringify({chat_id:process.env.CHAT_ID_VAL,service:process.env.SERVICE_VAL,error:"upload script failed (exit "+process.argv[1]+")"}))' "$STATUS")
              curl -fsS -X POST "$CALLBACK_VAL" \
                -H "Content-Type: application/json" \
                -H "X-Verify: $VERIFY_TOKEN" \
                -d "$ERR_PAYLOAD" || true
            fi
            exit $STATUS
          fi

          echo "$JSON" > result.json

          # Parse result — build full callback payload (including multi-part array if present)
          # upload.mjs outputs: { main: { service, url, raw_url, filename, size, human_size, expires_at, multi?, parts? } }
          # If main.multi=true and main.parts is an array, we pass parts through to the callback.
          PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" RESULT_JSON_PATH="result.json" SERVICE_VAL="$SERVICE_VAL" node -e '
            const fs = require("fs");
            const r = JSON.parse(fs.readFileSync(process.env.RESULT_JSON_PATH, "utf8"));
            const main = r.main || {};
            const o = {
              chat_id: process.env.CHAT_ID_VAL,
              service: main.service || process.env.SERVICE_VAL,
              url: main.url || "",
              raw_url: main.raw_url || "",
              filename: main.filename || "",
              size_bytes: Number(main.size || 0),
              human_size: main.human_size || "",
              expires_at: main.expires_at || "",
            };
            // If multi-part upload (pixeldrain >10GB auto-split), pass parts array
            if (main.multi && Array.isArray(main.parts)) {
              o.parts = main.parts.map(p => ({
                url: p.url || "",
                raw_url: p.raw_url || "",
                filename: p.filename || "",
                size: Number(p.size || 0),
                human_size: p.human_size || "",
              }));
            }
            process.stdout.write(JSON.stringify(o));
          ')

          # Extract fields for GitHub Actions notices
          MAIN_URL=$(echo "$PAYLOAD" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).url||'')")
          MAIN_SERVICE=$(echo "$PAYLOAD" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).service||'')")
          MAIN_FNAME=$(echo "$PAYLOAD" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).filename||'')")
          MAIN_HSIZE=$(echo "$PAYLOAD" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).human_size||'')")

          echo "::notice title=service::$MAIN_SERVICE"
          echo "::notice title=$MAIN_SERVICE HTML::$MAIN_URL"
          echo "::notice title=filename::$MAIN_FNAME"
          echo "::notice title=size::$MAIN_HSIZE"
          echo "::notice title=payload::$PAYLOAD"

          # ── Callback to Vercel bot with results ──
          if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
            curl -fsS -X POST "$CALLBACK_VAL" \
              -H "Content-Type: application/json" \
              -H "X-Verify: $VERIFY_TOKEN" \
              -d "$PAYLOAD" || true
          fi

          # NOTE: result.json is intentionally NOT deleted here so the
          # "Log disk space and upload details" step below can read it.

      # Fix 7: Cancellation handler — when the user clicks "Cancel" in GitHub
      # Actions UI, GitHub sends SIGTERM to the running process. With our new
      # upload.mjs graceful-shutdown handler, the Node process exits within ~1s.
      # This step then runs (`if: cancelled()`) and sends a cancellation
      # callback to the Vercel bot so the user gets a clear "❌ Upload cancelled"
      # message instead of waiting for the callback timeout.
      - name: Handle cancellation
        if: cancelled()
        shell: bash
        run: |
          echo "::error::Workflow cancelled by user — cleanup complete"
          echo "CHAT_ID_VAL=$CHAT_ID_VAL"
          echo "SERVICE_VAL=$SERVICE_VAL"
          if [ -n "$CHAT_ID_VAL" ] && [ -n "$VERCEL_CALLBACK_URL" ]; then
            PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" SERVICE_VAL="$SERVICE_VAL" node -e 'console.log(JSON.stringify({status:"cancelled",chat_id:process.env.CHAT_ID_VAL,service:process.env.SERVICE_VAL,error:"Upload cancelled by user"}))')
            echo "Sending cancellation callback to bot..."
            curl -fsS -X POST "$VERCEL_CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -H "X-Verify: $VERIFY_TOKEN" \
              -d "$PAYLOAD" || echo "(callback failed — bot will show timeout instead)"
          else
            echo "(no chat_id — manual workflow run, no callback needed)"
          fi

      # Fix 6: Always-on logging step — captures final disk state and upload
      # result for post-mortem debugging. Runs whether the job succeeded,
      # failed, or was cancelled.
      - name: Log disk space and upload details
        if: always()
        shell: bash
        run: |
          echo "=== Final Disk State ==="
          df -h /
          echo ""
          echo "=== Work Dir Contents (if any) ==="
          ls -lh /tmp/storageto/ 2>/dev/null || echo "(work dir already cleaned or never created)"
          echo ""
          echo "=== Upload Summary (result.json) ==="
          if [ -f result.json ]; then
            cat result.json
            echo ""
            echo "=== Parsed Key Fields ==="
            node -e '
              try {
                const r = JSON.parse(require("fs").readFileSync("result.json","utf8"));
                const m = r.main || {};
                console.log("service:    ", m.service || "(missing)");
                console.log("url:         ", m.url || "(missing)");
                console.log("raw_url:     ", m.raw_url || "(missing)");
                console.log("filename:    ", m.filename || "(missing)");
                console.log("size:        ", m.human_size || "(missing)");
                if (m.multi && Array.isArray(m.parts)) {
                  console.log("multi-part:  ", m.parts.length, "parts");
                  m.parts.forEach((p, i) => console.log(`  part ${i+1}: ${p.filename} (${p.human_size}) → ${p.url}`));
                }
              } catch (e) {
                console.log("Could not parse result.json:", e.message);
              }
            '
          else
            echo "No result.json — upload did not complete successfully"
          fi
          echo ""
          echo "=== Workflow Conclusion ==="
          echo "job_status=${{ job.status }}"
