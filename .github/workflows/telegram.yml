name: Telegram upload

on:
  repository_dispatch:
    types: [telegram-upload]
  workflow_dispatch:
    inputs:
      source:
        description: "HTTP(S) URL to download and upload"
        required: true
        type: string
      filename:
        description: "Override filename (optional)"
        required: false
        type: string
        default: ""
      content_type:
        description: "Override content type (optional)"
        required: false
        type: string
        default: "application/octet-stream"

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      STORAGE_TO_VISITOR_TOKEN: ${{ secrets.STORAGE_TO_VISITOR_TOKEN }}
      VERCEL_CALLBACK_URL: ${{ secrets.VERCEL_CALLBACK_URL }}
      VERIFY_TOKEN: ${{ secrets.BOT_VERIFY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run upload
        env:
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        shell: bash
        run: |
          set -euo pipefail

          # Dump full event to debug file
          echo "$EVENT_PAYLOAD" > /tmp/event.json
          echo "::notice title=event dump::$(head -c 400 /tmp/event.json)"

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Read client_payload from the saved file using node (handles JSON safely)
            SOURCE=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.source_url||"")}catch(_){process.stdout.write("")}')
            FILENAME=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.filename||"")}catch(_){process.stdout.write("")}')
            CHAT_ID_VAL=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.chat_id?String(p.chat_id):"")}catch(_){process.stdout.write("")}')
            CALLBACK_VAL="$VERCEL_CALLBACK_URL"
          else
            SOURCE="${{ inputs.source }}"
            FILENAME="${{ inputs.filename }}"
            CHAT_ID_VAL=""
            CALLBACK_VAL=""
          fi

          echo "source=$SOURCE"
          echo "filename=$FILENAME"
          echo "chat_id=$CHAT_ID_VAL"

          if [ -z "$SOURCE" ]; then
            echo "::error::No source URL provided in client_payload"
            if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
              ERR_PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" node -e 'console.log(JSON.stringify({chat_id:process.env.CHAT_ID_VAL,error:"empty source_url in dispatch payload"}))')
              curl -fsS -X POST "$CALLBACK_VAL" \
                -H "Content-Type: application/json" \
                -H "X-Verify: $VERIFY_TOKEN" \
                -d "$ERR_PAYLOAD" || true
            fi
            exit 1
          fi

          ARGS=( "$SOURCE" )
          [ -n "$FILENAME" ] && ARGS+=( "$FILENAME" )

          set +e
          OUT=$(node upload.mjs "${ARGS[@]}" 2>&1 | tee /dev/stderr)
          STATUS=$?
          set -e

          # Parse the RESULT_JSON block from stdout
          JSON=$(echo "$OUT" | sed -n '/RESULT_JSON_BEGIN/,/RESULT_JSON_END/p' | sed '1d;$d')
          if [ $STATUS -ne 0 ] || [ -z "$JSON" ]; then
            echo "::error::upload script failed (exit $STATUS)"
            if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
              ERR_PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" node -e 'console.log(JSON.stringify({chat_id:process.env.CHAT_ID_VAL,error:"upload script failed (exit "+process.argv[1]+")"}))' "$STATUS")
              curl -fsS -X POST "$CALLBACK_VAL" \
                -H "Content-Type: application/json" \
                -H "X-Verify: $VERIFY_TOKEN" \
                -d "$ERR_PAYLOAD" || true
            fi
            exit $STATUS
          fi

          echo "$JSON" > result.json
          URL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('result.json','utf8')).url||'')")
          RAW=$(node -e "console.log(JSON.parse(require('fs').readFileSync('result.json','utf8')).raw_url||'')")
          SIZE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('result.json','utf8')).size||0)")
          FNAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('result.json','utf8')).filename||'')")
          echo "::notice title=storage.to link::$URL"
          echo "::notice title=raw link::$RAW"

          if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
            PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" URL="$URL" RAW="$RAW" FNAME="$FNAME" SIZE="$SIZE" node -e 'console.log(JSON.stringify({chat_id:process.env.CHAT_ID_VAL,url:process.env.URL,raw_url:process.env.RAW,filename:process.env.FNAME,size_bytes:Number(process.env.SIZE)}))')
            curl -fsS -X POST "$CALLBACK_VAL" \
              -H "Content-Type: application/json" \
              -H "X-Verify: $VERIFY_TOKEN" \
              -d "$PAYLOAD" || true
          fi
