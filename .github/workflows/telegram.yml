name: Telegram upload

on:
  repository_dispatch:
    types: [telegram-upload]
  workflow_dispatch:
    inputs:
      source:
        description: "HTTP(S) URL to download and upload"
        required: true
        type: string
      filename:
        description: "Override filename (optional)"
        required: false
        type: string
        default: ""
      service:
        description: "Upload service: pixeldrain | filekiwi"
        required: false
        type: choice
        default: "pixeldrain"
        options:
          - pixeldrain
          - filekiwi

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PIXELDRAIN_TOKEN: ${{ secrets.PIXELDRAIN_TOKEN }}
      VERCEL_CALLBACK_URL: ${{ secrets.VERCEL_CALLBACK_URL }}
      VERIFY_TOKEN: ${{ secrets.BOT_VERIFY_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup || true
          sudo apt-get clean || true
          docker system prune -af || true
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install @file-kiwi/node SDK + ffmpeg
        shell: bash
        run: |
          echo "=== Installing @file-kiwi/node SDK (for file.kiwi uploads) ==="
          npm install @file-kiwi/node --no-save 2>&1 | tail -3
          echo ""
          echo "=== Installing ffmpeg (for pixeldrain >10GB auto-splitting) ==="
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg 2>&1 | tail -3
          echo ""
          echo "=== Verify installs ==="
          node -e "const m = require('@file-kiwi/node'); console.log('@file-kiwi/node exports:', Object.keys(m))"
          ffmpeg -version | head -1

      - name: Download and upload
        env:
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        shell: bash
        run: |
          set -euo pipefail

          echo "$EVENT_PAYLOAD" > /tmp/event.json

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SOURCE=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.source_url||"")}catch(_){process.stdout.write("")}')
            FILENAME=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.filename||"")}catch(_){process.stdout.write("")}')
            CHAT_ID_VAL=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.chat_id?String(p.chat_id):"")}catch(_){process.stdout.write("")}')
            SERVICE_VAL=$(node -e 'const e=require("fs").readFileSync("/tmp/event.json","utf8");try{const p=JSON.parse(e).client_payload||{};process.stdout.write(p.service||"")}catch(_){process.stdout.write("")}')
            CALLBACK_VAL="$VERCEL_CALLBACK_URL"
          else
            SOURCE="${{ inputs.source }}"
            FILENAME="${{ inputs.filename }}"
            SERVICE_VAL="${{ inputs.service }}"
            CHAT_ID_VAL=""
            CALLBACK_VAL=""
          fi

          # Default service to pixeldrain if missing/empty
          if [ -z "$SERVICE_VAL" ]; then
            SERVICE_VAL="pixeldrain"
          fi

          echo "===== DISPATCH PAYLOAD ====="
          echo "source   = $SOURCE"
          echo "filename = $FILENAME"
          echo "service  = $SERVICE_VAL"
          echo "chat_id  = $CHAT_ID_VAL"
          echo "============================"

          if [ -z "$SOURCE" ]; then
            echo "::error::No source URL provided"
            if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
              ERR_PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" SERVICE_VAL="$SERVICE_VAL" node -e 'console.log(JSON.stringify({chat_id:process.env.CHAT_ID_VAL,service:process.env.SERVICE_VAL,error:"empty source_url in dispatch payload"}))')
              curl -fsS -X POST "$CALLBACK_VAL" \
                -H "Content-Type: application/json" \
                -H "X-Verify: $VERIFY_TOKEN" \
                -d "$ERR_PAYLOAD" || true
            fi
            exit 1
          fi

          # Service-specific env validation
          if [ "$SERVICE_VAL" = "pixeldrain" ] && [ -z "$PIXELDRAIN_TOKEN" ]; then
            echo "::error::service=pixeldrain but PIXELDRAIN_TOKEN secret is not set"
            if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
              ERR_PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" SERVICE_VAL="$SERVICE_VAL" node -e 'console.log(JSON.stringify({chat_id:process.env.CHAT_ID_VAL,service:process.env.SERVICE_VAL,error:"PIXELDRAIN_TOKEN secret not configured"}))')
              curl -fsS -X POST "$CALLBACK_VAL" \
                -H "Content-Type: application/json" \
                -H "X-Verify: $VERIFY_TOKEN" \
                -d "$ERR_PAYLOAD" || true
            fi
            exit 1
          fi
          # filekiwi needs no token (anonymous upload) — just needs @file-kiwi/node installed

          ARGS=( "$SOURCE" )
          [ -n "$FILENAME" ] && ARGS+=( "$FILENAME" )
          # Pass content_type as empty string so upload.mjs falls back to HEAD-detected type
          ARGS+=( "" )
          # 4th arg = service
          ARGS+=( "$SERVICE_VAL" )

          echo "Running: node upload.mjs <url> '${FILENAME}' '' '${SERVICE_VAL}'"

          set +e
          OUT=$(node upload.mjs "${ARGS[@]}" 2>&1 | tee /dev/stderr)
          STATUS=$?
          set -e

          JSON=$(echo "$OUT" | sed -n '/RESULT_JSON_BEGIN/,/RESULT_JSON_END/p' | sed '1d;$d')
          if [ $STATUS -ne 0 ] || [ -z "$JSON" ]; then
            echo "::error::upload script failed (exit $STATUS)"
            if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
              ERR_PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" SERVICE_VAL="$SERVICE_VAL" node -e 'console.log(JSON.stringify({chat_id:process.env.CHAT_ID_VAL,service:process.env.SERVICE_VAL,error:"upload script failed (exit "+process.argv[1]+")"}))' "$STATUS")
              curl -fsS -X POST "$CALLBACK_VAL" \
                -H "Content-Type: application/json" \
                -H "X-Verify: $VERIFY_TOKEN" \
                -d "$ERR_PAYLOAD" || true
            fi
            exit $STATUS
          fi

          echo "$JSON" > result.json

          # Parse result — build full callback payload (including multi-part array if present)
          # upload.mjs outputs: { main: { service, url, raw_url, filename, size, human_size, expires_at, multi?, parts? } }
          # If main.multi=true and main.parts is an array, we pass parts through to the callback.
          PAYLOAD=$(CHAT_ID_VAL="$CHAT_ID_VAL" RESULT_JSON_PATH="result.json" SERVICE_VAL="$SERVICE_VAL" node -e '
            const fs = require("fs");
            const r = JSON.parse(fs.readFileSync(process.env.RESULT_JSON_PATH, "utf8"));
            const main = r.main || {};
            const o = {
              chat_id: process.env.CHAT_ID_VAL,
              service: main.service || process.env.SERVICE_VAL,
              url: main.url || "",
              raw_url: main.raw_url || "",
              filename: main.filename || "",
              size_bytes: Number(main.size || 0),
              human_size: main.human_size || "",
              expires_at: main.expires_at || "",
            };
            // If multi-part upload (pixeldrain >10GB auto-split), pass parts array
            if (main.multi && Array.isArray(main.parts)) {
              o.parts = main.parts.map(p => ({
                url: p.url || "",
                raw_url: p.raw_url || "",
                filename: p.filename || "",
                size: Number(p.size || 0),
                human_size: p.human_size || "",
              }));
            }
            process.stdout.write(JSON.stringify(o));
          ')

          # Extract fields for GitHub Actions notices
          MAIN_URL=$(echo "$PAYLOAD" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).url||'')")
          MAIN_SERVICE=$(echo "$PAYLOAD" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).service||'')")
          MAIN_FNAME=$(echo "$PAYLOAD" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).filename||'')")
          MAIN_HSIZE=$(echo "$PAYLOAD" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).human_size||'')")

          echo "::notice title=service::$MAIN_SERVICE"
          echo "::notice title=$MAIN_SERVICE HTML::$MAIN_URL"
          echo "::notice title=filename::$MAIN_FNAME"
          echo "::notice title=size::$MAIN_HSIZE"
          echo "::notice title=payload::$PAYLOAD"

          # ── Callback to Vercel bot with results ──
          if [ -n "$CHAT_ID_VAL" ] && [ -n "$CALLBACK_VAL" ]; then
            curl -fsS -X POST "$CALLBACK_VAL" \
              -H "Content-Type: application/json" \
              -H "X-Verify: $VERIFY_TOKEN" \
              -d "$PAYLOAD" || true
          fi

          # Cleanup
          rm -f result.json
