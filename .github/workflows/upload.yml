name: Upload to storage.to

on:
  workflow_dispatch:
    inputs:
      source:
        description: "HTTP(S) URL or in-repo file path to upload"
        required: true
        type: string
      filename:
        description: "Override filename (optional)"
        required: false
        type: string
        default: ""
      content_type:
        description: "Override content type (optional)"
        required: false
        type: string
        default: "application/octet-stream"

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      STORAGE_TO_VISITOR_TOKEN: ${{ secrets.STORAGE_TO_VISITOR_TOKEN }}
      CONVERT_TO_MP4: "1"
      EXTRACT_SUBS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup || true
          sudo apt-get clean || true
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -version | head -1

      - name: Run upload
        id: upload
        shell: bash
        run: |
          set -euo pipefail
          ARGS=( "${{ inputs.source }}" )
          if [ -n "${{ inputs.filename }}" ]; then ARGS+=( "${{ inputs.filename }}" ); fi
          if [ -n "${{ inputs.content_type }}" ] && [ "${{ inputs.content_type }}" != "application/octet-stream" ]; then
            ARGS+=( "${{ inputs.content_type }}" )
          fi
          OUT=$(node upload.mjs "${ARGS[@]}" 2>&1 | tee /dev/stderr)
          JSON=$(echo "$OUT" | sed -n '/RESULT_JSON_BEGIN/,/RESULT_JSON_END/p' | sed '1d;$d')
          echo "$JSON" > result.json
          URL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('result.json','utf8')).main?.url||'')")
          RAW=$(node -e "console.log(JSON.parse(require('fs').readFileSync('result.json','utf8')).main?.raw_url||'')")
          STREAM=$(node -e "console.log(JSON.parse(require('fs').readFileSync('result.json','utf8')).main?.streaming_url||'')")
          SUBS=$(node -e "const r=JSON.parse(require('fs').readFileSync('result.json','utf8'));console.log(JSON.stringify(r.subtitles||[]))")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "raw_url=$RAW" >> "$GITHUB_OUTPUT"
          echo "streaming_url=$STREAM" >> "$GITHUB_OUTPUT"
          echo "subtitles=$SUBS" >> "$GITHUB_OUTPUT"
          echo "::notice title=storage.to upload::HTML: $URL | Streaming: $STREAM"
          echo "::notice title=subtitles::$SUBS"

      - name: Persist result
        if: always()
        run: |
          if [ -f result.json ]; then
            echo "result.json (truncated):"
            head -c 1200 result.json
            echo
          fi
