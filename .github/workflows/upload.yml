name: Upload to storage.to

on:
  workflow_dispatch:
    inputs:
      source:
        description: "HTTP(S) URL to upload to storage.to"
        required: true
        type: string
      filename:
        description: "Override filename (optional)"
        required: false
        type: string
        default: ""

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      STORAGE_TO_VISITOR_TOKEN: ${{ secrets.STORAGE_TO_VISITOR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup || true
          sudo apt-get clean || true
          docker system prune -af || true
          df -h /

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run upload
        id: upload
        shell: bash
        run: |
          set -euo pipefail
          ARGS=( "${{ inputs.source }}" )
          if [ -n "${{ inputs.filename }}" ]; then ARGS+=( "${{ inputs.filename }}" ); fi
          OUT=$(node upload.mjs "${ARGS[@]}" 2>&1 | tee /dev/stderr)
          JSON=$(echo "$OUT" | sed -n '/RESULT_JSON_BEGIN/,/RESULT_JSON_END/p' | sed '1d;$d')
          echo "$JSON" > result.json
          URL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('result.json','utf8')).main?.url||'')")
          RAW=$(node -e "console.log(JSON.parse(require('fs').readFileSync('result.json','utf8')).main?.raw_url||'')")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "raw_url=$RAW" >> "$GITHUB_OUTPUT"
          echo "::notice title=storage.to upload::$URL"

      - name: Persist result
        if: always()
        run: |
          if [ -f result.json ]; then
            echo "result.json (truncated):"
            head -c 1200 result.json
            echo
          fi
