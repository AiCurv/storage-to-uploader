name: Upload to pixeldrain / file.kiwi

on:
  workflow_dispatch:
    inputs:
      source:
        description: "HTTP(S) URL to upload"
        required: true
        type: string
      filename:
        description: "Override filename (optional)"
        required: false
        type: string
        default: ""
      service:
        description: "Upload service: pixeldrain | filekiwi"
        required: false
        type: choice
        default: "pixeldrain"
        options:
          - pixeldrain
          - filekiwi

jobs:
  upload:
    runs-on: ubuntu-latest
    # Fix 5: Extended from 120 → 240 minutes (4 hours) for large file uploads.
    timeout-minutes: 240
    env:
      PIXELDRAIN_TOKEN: ${{ secrets.PIXELDRAIN_TOKEN }}
      VERCEL_CALLBACK_URL: ${{ secrets.VERCEL_CALLBACK_URL }}
      VERIFY_TOKEN: ${{ secrets.BOT_VERIFY_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fix 1 (v8.2 revised): Fast manual disk cleanup (easimon broke setup-node).
      # See telegram.yml for full explanation.
      - name: Maximize build disk space
        shell: bash
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          docker image prune -af --filter "until=1h" 2>/dev/null || true
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install @file-kiwi/node SDK + ffmpeg
        shell: bash
        run: |
          echo "=== Installing @file-kiwi/node SDK (for file.kiwi uploads) ==="
          npm install @file-kiwi/node --no-save 2>&1 | tail -3
          echo ""
          echo "=== Installing ffmpeg (for pixeldrain >10GB auto-splitting) ==="
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg 2>&1 | tail -3
          echo ""
          echo "=== Verify installs ==="
          node -e "const m = require('@file-kiwi/node'); console.log('@file-kiwi/node exports:', Object.keys(m))"
          ffmpeg -version | head -1

      - name: Download and upload
        env:
          SOURCE_URL: ${{ inputs.source }}
          FILENAME: ${{ inputs.filename }}
          SERVICE_VAL: ${{ inputs.service }}
        shell: bash
        run: |
          set -euo pipefail

          SOURCE="$SOURCE_URL"
          FILENAME="$FILENAME"
          SERVICE_VAL="$SERVICE_VAL"

          [ -z "$SERVICE_VAL" ] && SERVICE_VAL="pixeldrain"

          echo "===== MANUAL RUN ====="
          echo "source   = $SOURCE"
          echo "filename = $FILENAME"
          echo "service  = $SERVICE_VAL"
          echo "======================"

          ARGS=( "$SOURCE" )
          [ -n "$FILENAME" ] && ARGS+=( "$FILENAME" )
          ARGS+=( "" )
          ARGS+=( "$SERVICE_VAL" )

          echo "Running: node upload.mjs <url> '${FILENAME}' '' '${SERVICE_VAL}'"

          node upload.mjs "${ARGS[@]}"

      # Fix 6: Always-on logging step — captures final disk state for debugging.
      - name: Log disk space and upload details
        if: always()
        shell: bash
        run: |
          echo "=== Final Disk State ==="
          df -h /
          echo ""
          echo "=== Work Dir Contents (if any) ==="
          ls -lh /tmp/storageto/ 2>/dev/null || echo "(work dir already cleaned or never created)"
          echo ""
          echo "=== Workflow Conclusion ==="
          echo "job_status=${{ job.status }}"
